name: Deploy kruchinkin.site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-kruchinkin-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify production build
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Upload isolated application directory
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          port: ${{ secrets.TIMEWEB_PORT || 22 }}
          username: root
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          source: "app,components,lib,public,deploy,package.json,package-lock.json,next.config.js,postcss.config.js,tailwind.config.ts,tsconfig.json,next-env.d.ts"
          target: /var/www/kruchinkin.site
          rm: true

      - name: Build and activate kruchinkin.site
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          port: ${{ secrets.TIMEWEB_PORT || 22 }}
          username: root
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR=/var/www/kruchinkin.site
            APP_NAME=kruchinkin-site
            APP_PORT=3002

            cd "$APP_DIR"
            npm ci --legacy-peer-deps
            npm run build

            if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
              pm2 restart "$APP_NAME" --update-env
            else
              if ss -ltn | awk '{print $4}' | grep -Eq "(^|:)${APP_PORT}$"; then
                echo "Port ${APP_PORT} is already occupied by another service"
                exit 1
              fi
              pm2 start npm --name "$APP_NAME" -- start -- -p "$APP_PORT" -H 127.0.0.1
            fi

            sleep 4
            curl --fail --silent --show-error "http://127.0.0.1:${APP_PORT}/" >/dev/null

            mkdir -p /var/www/certbot /root/backups
            if [ -f /etc/nginx/sites-available/kruchinkin.site ]; then
              cp /etc/nginx/sites-available/kruchinkin.site "/root/backups/kruchinkin.site.$(date +%Y%m%d-%H%M%S).conf"
            fi

            if [ ! -f /etc/letsencrypt/live/kruchinkin.site/fullchain.pem ]; then
              cp "$APP_DIR/deploy/nginx-kruchinkin.http.conf" /etc/nginx/sites-available/kruchinkin.site
              ln -sfn /etc/nginx/sites-available/kruchinkin.site /etc/nginx/sites-enabled/kruchinkin.site
              nginx -t
              systemctl reload nginx
              certbot certonly --webroot --webroot-path /var/www/certbot \
                --non-interactive --agree-tos --register-unsafely-without-email \
                -d kruchinkin.site -d www.kruchinkin.site
            fi

            cp "$APP_DIR/deploy/nginx-kruchinkin.conf" /etc/nginx/sites-available/kruchinkin.site
            ln -sfn /etc/nginx/sites-available/kruchinkin.site /etc/nginx/sites-enabled/kruchinkin.site
            nginx -t
            systemctl reload nginx
            pm2 save

            curl --fail --silent --show-error https://kruchinkin.site/ >/dev/null
            curl --fail --silent --show-error https://www.kruchinkin.site/ >/dev/null
